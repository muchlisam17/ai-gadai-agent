version: '3.8'

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_WEBHOOK_URL=https://nonincarnated-lexie-reversedly.ngrok-free.dev
      - WEBHOOK_URL=https://nonincarnated-lexie-reversedly.ngrok-free.dev
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=false
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - gadai-net

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - gadai-net

  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - gadai-net

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=gadai_user
      - POSTGRES_PASSWORD=gadai_pass123
      - POSTGRES_DB=gadai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gadai-net

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gadai-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_USER=gadai_user
      - DB_PASSWORD=gadai_pass123
      - DB_NAME=gadai_db
      - DB_PORT=5432
    depends_on:
      - postgres
    networks:
      - gadai-net

networks:
  gadai-net:
    driver: bridge

volumes:
  n8n_data:
  qdrant_data:
  ollama_data:
  postgres_data:
